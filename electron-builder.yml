appId: io.evolve.ble-calculator
productName: Evolve Calc
copyright: Copyright © 2026 Evolve Calc

directories:
  output: release

files:
  - dist/src/electron/**
  - dist/src/shared/**
  - dist/renderer/**
  - package.json
  - index.js
  - index.d.ts
  - index.*.node
  - "!**/*.map"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"

asarUnpack:
  - index.*.node

mac:
  category: public.app-category.productivity
  # CoreBluetooth refuses to start without these Info.plist usage strings.
  # Required for both the central scan and the guest peripheral/GATT server.
  extendInfo:
    NSBluetoothAlwaysUsageDescription: "Evolve Calc uses Bluetooth to discover, host, and join nearby calculator sessions."
    NSBluetoothPeripheralUsageDescription: "Evolve Calc advertises this device over Bluetooth so a host can find and connect to it as a calculator guest."
  # NOTE: a notarized hardened-runtime build additionally needs the
  # `com.apple.security.device.bluetooth` entitlement (see docs).
  target:
    - dmg

win:
  target:
    - nsis

linux:
  category: Utility
  target:
    - AppImage
    - deb
